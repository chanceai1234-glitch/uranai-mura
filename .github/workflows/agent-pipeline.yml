name: Agent Pipeline

# Issue作成・ラベル変更をトリガーにエージェントパイプラインを実行
on:
  issues:
    types: [opened, labeled]

# 同一Issueの重複実行を防止
concurrency:
  group: agent-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  dispatch:
    runs-on: ubuntu-latest
    # "agent" ラベルが付いたIssueのみ実行
    if: contains(github.event.issue.labels.*.name, 'agent')
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install anthropic pyyaml

      - name: Create Vault directory
        run: |
          mkdir -p /tmp/vault/{00_Inbox,10_Research/{East-Asia,South-Asia,Southeast-Asia,Central-Asia,Middle-East,Europe,Africa,Americas,Oceania,Modern-Digital},20_Science/{Studies,Meta-Analyses,Verdicts},30_Content/{Drafts,Published,Assets},40_Platform/{Requirements,Architecture,UI-Mockups,Specs},90_Templates,99_Meta,_attachments}
          # テンプレートとメタファイルをコピー（ローカルVaultがない場合の初期化）
          echo "## ログ" > /tmp/vault/99_Meta/Agent-Log.md

      - name: Extract issue data
        id: issue
        run: |
          echo "title=${{ github.event.issue.title }}" >> $GITHUB_OUTPUT
          echo "number=${{ github.event.issue.number }}" >> $GITHUB_OUTPUT

      - name: Build issue JSON
        id: issue_json
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const data = {
              title: issue.title,
              body: issue.body || "",
              labels: issue.labels.map(l => l.name).filter(l => l !== "agent"),
              number: issue.number,
            };
            core.setOutput("json", JSON.stringify(data));

      - name: Run Orchestrator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OBSIDIAN_VAULT_PATH: /tmp/vault
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m agents.orchestrator '${{ steps.issue_json.outputs.json }}' > result.json 2>&1 || true
          cat result.json

      - name: Post result to Issue
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let result = 'パイプライン実行完了（詳細はActionsログを確認）';
            try {
              const raw = fs.readFileSync('result.json', 'utf8');
              // 最後のJSONブロックを抽出
              const lines = raw.split('\n');
              let jsonStart = -1;
              let braceCount = 0;
              for (let i = lines.length - 1; i >= 0; i--) {
                if (lines[i].trim() === '}') {
                  jsonStart = i;
                  braceCount = 1;
                  for (let j = i - 1; j >= 0; j--) {
                    if (lines[j].includes('{')) braceCount--;
                    if (lines[j].includes('}')) braceCount++;
                    if (braceCount === 0) { jsonStart = j; break; }
                  }
                  break;
                }
              }
              if (jsonStart >= 0) {
                const jsonStr = lines.slice(jsonStart).join('\n');
                const data = JSON.parse(jsonStr);
                const status = data.status === 'completed' ? '✅ 完了' : '⚠️ ' + data.status;
                result = `## エージェント実行結果\n\n`;
                result += `**ステータス**: ${status}\n`;
                result += `**パイプライン**: ${data.pipeline || 'unknown'}\n`;
                result += `**占い**: ${data.uranai_name || 'unknown'}\n\n`;
                result += `<details><summary>詳細</summary>\n\n\`\`\`json\n${JSON.stringify(data, null, 2)}\n\`\`\`\n</details>`;
              }
            } catch (e) {
              result += '\n\n(結果のパースに失敗: ' + e.message + ')';
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: result + '\n\n🤖 Generated by Agent Pipeline',
            });

      - name: Upload vault artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vault-${{ github.event.issue.number }}
          path: /tmp/vault/
          retention-days: 30
