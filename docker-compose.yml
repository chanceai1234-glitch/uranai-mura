services:
  # 汎用パイプライン実行（全フェーズ対応）
  pipeline:
    build: .
    volumes:
      - "${OBSIDIAN_VAULT_PATH:-C:/Users/加藤敦也KatoAtsuya/uranai-mura-vault}:/vault"
      - ./research:/app/research
      - ./src:/app/src
      - ./tests:/app/tests
    env_file: .env
    environment:
      - OBSIDIAN_VAULT_PATH=/vault

  # テスト実行
  test:
    build: .
    volumes:
      - "${OBSIDIAN_VAULT_PATH:-C:/Users/加藤敦也KatoAtsuya/uranai-mura-vault}:/vault"
      - ./src:/app/src
      - ./tests:/app/tests
    environment:
      - OBSIDIAN_VAULT_PATH=/vault
    entrypoint: ["python", "-m", "pytest", "-v"]
